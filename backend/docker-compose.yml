version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai_marketplace_postgres
    environment:
      POSTGRES_USER: ai_marketplace
      POSTGRES_PASSWORD: ai_marketplace_password
      POSTGRES_DB: ai_marketplace
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_marketplace"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    container_name: ai_marketplace_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  celery_worker:
    build: .
    container_name: ai_marketplace_celery_worker
    command: celery -A celery_app worker --loglevel=info --concurrency=4
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    networks:
      - app_network
    restart: unless-stopped

  celery_beat:
    build: .
    container_name: ai_marketplace_celery_beat
    command: celery -A celery_app beat --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    networks:
      - app_network
    restart: unless-stopped

  flower:
    build: .
    container_name: ai_marketplace_flower
    command: celery -A celery_app flower --port=5555
    ports:
      - "5555:5555"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - redis
      - celery_worker
    networks:
      - app_network
    restart: unless-stopped

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
